    --surface:rgba(40,48,92,.55);
    --moon:#f3e9c6;
    --gold:#e0b84a;
    --wolf:#cc4644;
    --village:#5b9bd5;
    --neutral:#b985e0;
    --ink:#eceefb;
    --muted:#9298bd;
    --line:rgba(160,170,220,.16);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,"Segoe UI","Sukhumvit Set","Helvetica Neue",sans-serif;
    background:
      radial-gradient(1200px 600px at 50% -10%, #2a2155 0%, rgba(42,33,85,0) 60%),
      radial-gradient(900px 500px at 80% 110%, #1b2a4a 0%, rgba(27,42,74,0) 55%),
      linear-gradient(180deg,#0b1026 0%,#0d1230 55%,#0a0e22 100%);
    color:var(--ink);
    min-height:100vh;
    line-height:1.5;
    overflow-x:hidden;
  }
  /* stars */
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:
      radial-gradient(1.5px 1.5px at 20% 30%, rgba(255,255,255,.7), transparent),
      radial-gradient(1px 1px at 70% 20%, rgba(255,255,255,.6), transparent),
      radial-gradient(1.5px 1.5px at 40% 70%, rgba(255,255,255,.5), transparent),
      radial-gradient(1px 1px at 85% 60%, rgba(255,255,255,.5), transparent),
      radial-gradient(1px 1px at 15% 85%, rgba(255,255,255,.45), transparent),
      radial-gradient(1.5px 1.5px at 60% 90%, rgba(255,255,255,.5), transparent);
    opacity:.55;
  }
  .wrap{position:relative;z-index:1;max-width:520px;margin:0 auto;padding:calc(22px + env(safe-area-inset-top)) max(18px,env(safe-area-inset-right)) calc(60px + env(safe-area-inset-bottom)) max(18px,env(safe-area-inset-left))}
  /* day = amber sunlight / night = dark blue moon background themes (game runner) */
  .wrap::after{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;opacity:0;transition:opacity .6s ease}
  .wrap.phase-day::after{opacity:1;
    background:
      radial-gradient(1100px 560px at 50% -8%, #c8861f 0%, rgba(200,134,31,0) 58%),
      radial-gradient(800px 500px at 80% 112%, #6b4a14 0%, rgba(107,74,20,0) 55%),
      linear-gradient(180deg,#2f2410 0%,#41310f 48%,#241a09 100%)}
  .wrap.phase-night::after{opacity:1;
    background:
      radial-gradient(1100px 560px at 50% -8%, #2536a0 0%, rgba(37,54,160,0) 58%),
      radial-gradient(800px 500px at 80% 112%, #16265e 0%, rgba(22,38,94,0) 55%),
      linear-gradient(180deg,#091038 0%,#0c1747 52%,#05091f 100%)}

  .eyebrow{font-family:Georgia,"Times New Roman",serif;letter-spacing:.42em;text-transform:uppercase;font-size:11px;color:var(--gold);text-align:center;margin:0 0 4px;padding-left:.42em}
  h1.title{font-size:38px;font-weight:800;text-align:center;margin:0;letter-spacing:.02em;
    background:linear-gradient(180deg,#fff,#cbd0f0);-webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{text-align:center;color:var(--muted);font-size:13px;margin:6px 0 0}

  /* moon */
  .cover{width:100%;aspect-ratio:1024/931;margin:0 0 6px;background-size:contain;background-repeat:no-repeat;background-position:center;
    -webkit-mask-image:radial-gradient(125% 125% at 50% 42%, #000 58%, transparent 100%);
    mask-image:radial-gradient(125% 125% at 50% 42%, #000 58%, transparent 100%)}
  .moon{width:96px;height:96px;border-radius:50%;margin:6px auto 14px;position:relative;    background:radial-gradient(circle at 38% 34%, #fffef6 0%, #f3e9c6 42%, #d9c98e 100%);
    box-shadow:0 0 38px 6px rgba(243,233,198,.35),inset -10px -8px 22px rgba(120,105,60,.35)}
  .moon::after{content:"";position:absolute;inset:0;border-radius:50%;
    background:radial-gradient(circle at 70% 64%, rgba(150,135,90,.5) 0 8%, transparent 9%),
      radial-gradient(circle at 55% 40%, rgba(150,135,90,.35) 0 6%, transparent 7%),
      radial-gradient(circle at 38% 70%, rgba(150,135,90,.4) 0 5%, transparent 6%)}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:16px;
    backdrop-filter:blur(6px);box-shadow:0 10px 30px rgba(0,0,0,.3)}
  .card + .card{margin-top:14px}
  .section-label{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin:0 0 12px;display:flex;align-items:center;gap:8px}
  .section-label::after{content:"";flex:1;height:1px;background:var(--line)}

  /* inputs */
  .row{display:flex;gap:8px}
  input[type=text]{flex:1;background:rgba(10,14,38,.6);border:1px solid var(--line);color:var(--ink);
    padding:12px 14px;border-radius:12px;font-size:16px;outline:none}
  input[type=text]:focus{border-color:var(--gold)}
  .btn{border:none;border-radius:12px;font-size:15px;font-weight:700;padding:12px 16px;cursor:pointer;
    color:#0b1026;background:linear-gradient(180deg,#f4e6b0,#e0b84a);transition:transform .08s,filter .15s}
  .btn:active{transform:translateY(1px)}
  .btn:disabled{opacity:.4;filter:grayscale(.4);cursor:not-allowed}
  .btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
  .btn.block{width:100%;padding:16px;font-size:16px;border-radius:14px;margin-top:6px}
  .btn.danger{background:transparent;border:1px solid rgba(204,70,68,.5);color:#ef9a98}

  /* player chips */
  .players{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
  .chip{display:flex;align-items:center;gap:8px;background:rgba(10,14,38,.5);border:1px solid var(--line);
    border-radius:999px;padding:7px 10px 7px 14px;font-size:14px}
  .chip b{font-weight:600}
  .chip .x{width:20px;height:20px;border-radius:50%;display:grid;place-items:center;background:rgba(204,70,68,.18);
    color:#ef9a98;font-size:13px;cursor:pointer;line-height:1}
  .empty{color:var(--muted);font-size:13px;margin-top:12px;text-align:center}

  /* role rows */
  .role{display:flex;align-items:center;gap:12px;padding:11px 4px;border-bottom:1px solid var(--line)}
  .role:last-child{border-bottom:none}
  .role .emj{font-size:22px;width:40px;text-align:center;display:flex;align-items:center;justify-content:center}
  .cat-head{font-size:12px;font-weight:700;letter-spacing:.1em;color:var(--gold);margin:14px 0 2px;padding-top:8px;border-top:1px solid var(--line)}
  .cat-head:first-child{border-top:none;padding-top:0;margin-top:2px}
  .role-toggle{width:100%;margin:8px 0 2px;padding:10px;background:rgba(255,255,255,.04);border:1px dashed var(--line);border-radius:10px;color:var(--gold);font-size:13px;font-weight:700;letter-spacing:.04em;cursor:pointer}
  .role-toggle:active{background:rgba(255,255,255,.08)}
  .bal-chip{font-size:10px;font-weight:700;color:var(--muted);background:rgba(10,14,38,.5);border:1px solid var(--line);border-radius:6px;padding:1px 5px;margin-left:4px;vertical-align:middle}
  .bal-chip.w{color:#f0908e;border-color:rgba(204,70,68,.4)}
  .bal-chip.v{color:#9fc6ee;border-color:rgba(91,155,213,.4)}
  .role-main{display:flex;align-items:center;gap:12px;flex:1;min-width:0;cursor:pointer}
  .info-dot{font-size:12px;color:var(--muted);opacity:.7}
  .role-detail{background:rgba(10,14,38,.5);border:1px solid var(--line);border-radius:12px;padding:12px;margin:0 0 10px}
  .rd-row{display:flex;gap:10px;font-size:13px;padding:4px 0}
  .rd-row+.rd-row{border-top:1px solid var(--line)}
  .rd-k{flex:0 0 78px;color:var(--gold);font-weight:700}
  .rd-v{flex:1;color:#d6daf2;line-height:1.5}
  .packbox{margin-top:12px;background:rgba(204,70,68,.14);border:1px solid rgba(204,70,68,.4);border-radius:12px;padding:10px 12px;font-size:14px;color:#f0d6d5;line-height:1.5}
  .packbox b{color:#fff}
  .ricon{border-radius:50%;object-fit:cover;object-position:center 15%;display:inline-block;vertical-align:middle;box-shadow:inset 0 0 0 5px rgba(15,20,48,0.55),0 2px 8px rgba(0,0,0,.4)}
  .pill .ricon{margin-right:2px}
  .role .meta{flex:1;min-width:0}
  .role .rn{font-size:15px;font-weight:600}
  .role .re{font-size:11px;color:var(--muted);letter-spacing:.05em}
  .stepper{display:flex;align-items:center;gap:0;background:rgba(10,14,38,.55);border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .stepper button{width:34px;height:34px;border:none;background:transparent;color:var(--ink);font-size:20px;cursor:pointer}
  .stepper button:active{background:rgba(224,184,74,.2)}
  .stepper .cnt{width:30px;text-align:center;font-weight:700;font-size:15px}
  .stepper .cnt.on{color:var(--gold)}

  .tally{display:flex;justify-content:space-between;align-items:center;margin-top:14px;font-size:14px}
  .tally .n{font-weight:800;font-size:16px}
  .tally .ok{color:#7fd99a}
  .tally .bad{color:#ef9a98}
  .bal-head{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
  .bal-score{font-size:19px;font-weight:800}
  .bal-score.wolf{color:#f0908e}.bal-score.vil{color:#9fc6ee}.bal-score.ok{color:#9be3b1}
  .bal-track{position:relative;height:12px;border-radius:999px;background:linear-gradient(90deg,#cc4644 0%,#3a3550 50%,#5b9bd5 100%)}
  .bal-center{position:absolute;left:50%;top:-4px;bottom:-4px;width:2px;background:rgba(255,255,255,.45);transform:translateX(-1px)}
  .bal-marker{position:absolute;top:50%;width:18px;height:18px;border-radius:50%;background:#fff;border:3px solid #0b1026;transform:translate(-50%,-50%);box-shadow:0 2px 6px rgba(0,0,0,.5);transition:left .25s}
  .bal-ends{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--muted);margin-top:10px}
  .bal-lbl{font-weight:700}
  .bal-lbl.wolf{color:#f0908e}.bal-lbl.vil{color:#9fc6ee}.bal-lbl.ok{color:#9be3b1}
  /* === balance indicator (text-first) === */
  .bal-indicator{text-align:center;font-weight:800;font-size:16px;padding:10px;border-radius:12px;margin-bottom:10px;border:1px solid var(--line)}
  .bal-sub{font-weight:700;font-size:10px;letter-spacing:.02em}
  .b-red{color:#f0726f}.b-orange{color:#f0a85c}.b-neutral{color:#cdd3ea}.b-ltblue{color:#9fc6ee}.b-blue{color:#5b9bd5}
  .b-amber{color:#e6c34a}.b-navy{color:#7aa7e0}
  .bal-indicator.b-amber{background:rgba(224,184,74,.13);border-color:rgba(224,184,74,.4)}
  .bal-indicator.b-navy{background:rgba(70,110,200,.18);border-color:rgba(70,110,200,.5)}
  .winrate{display:flex;justify-content:space-between;align-items:center;gap:8px;font-size:12px;margin-bottom:10px;padding:7px 10px;border-radius:10px;background:rgba(10,14,38,.4);border:1px solid var(--line)}
  .winrate .wr-h{color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-size:10px}
  .winrate .wr-v{font-weight:800}
  .diff-badge.dyn{border-style:dashed}
  .soc-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--muted);margin-top:10px;padding-top:10px;border-top:1px solid var(--line)}
  .soc-row b{font-weight:800}
  .soc-easy{color:#9be3b1}.soc-medium{color:#9fc6ee}.soc-hard{color:#f0a85c}.soc-insane{color:#e09bd9}
  .bal-indicator.b-red{background:rgba(204,70,68,.16);border-color:rgba(204,70,68,.45)}
  .bal-indicator.b-orange{background:rgba(224,150,60,.15);border-color:rgba(224,150,60,.4)}
  .bal-indicator.b-neutral{background:rgba(120,128,160,.14);border-color:var(--line)}
  .bal-indicator.b-ltblue{background:rgba(120,170,220,.14);border-color:rgba(120,170,220,.4)}
  .bal-indicator.b-blue{background:rgba(91,155,213,.16);border-color:rgba(91,155,213,.45)}
  /* === difficulty badge === */
  .diff-badge{display:inline-block;font-size:10px;font-weight:700;border-radius:6px;padding:1px 6px;margin-left:2px;vertical-align:middle;border:1px solid var(--line)}
  .diff-badge.d1{color:#9be3b1;background:rgba(127,217,154,.12)}
  .diff-badge.d2{color:#9fc6ee;background:rgba(120,170,220,.12)}
  .diff-badge.d3{color:#f0c674;background:rgba(224,184,74,.12)}
  .diff-badge.d4{color:#f0a85c;background:rgba(224,150,60,.12)}
  .diff-badge.d5{color:#e09bd9;background:rgba(190,120,220,.14)}
  /* === recommendation engine === */
  .recmode{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
  .rec-desc{margin:0 0 10px;font-size:12.5px;color:var(--muted);text-align:center;line-height:1.5}
  .recmode .tchip{min-width:auto;flex:1 1 40%;font-size:12px;padding:8px 6px}
  .tchip.rec-soon{opacity:.45;cursor:default}
  .rec-preview{display:flex;flex-wrap:wrap;gap:6px;margin:4px 0 10px}
  .rec-item{font-size:13px;font-weight:600;background:rgba(10,14,38,.5);border:1px solid var(--line);border-radius:8px;padding:5px 9px}
  .rec-stats{display:flex;flex-direction:column;gap:4px;font-size:13px;color:var(--muted)}
  .rec-stats b{font-weight:800}
  .timersel{display:flex;flex-wrap:wrap;gap:8px}
  .tchip{flex:1;min-width:60px;border:1px solid var(--line);background:rgba(10,14,38,.5);color:var(--ink);border-radius:10px;padding:10px 6px;font-size:14px;font-weight:600;cursor:pointer}
  .tchip.on{background:linear-gradient(180deg,#f4e6b0,#e0b84a);color:#0b1026;border-color:transparent}
  .daytimer{text-align:center;font-size:26px;font-weight:800;letter-spacing:.04em;color:var(--gold);background:rgba(224,184,74,.1);border:1px solid rgba(224,184,74,.35);border-radius:14px;padding:12px;margin:6px 0 12px}
  .daytimer.up{color:#f0908e;background:rgba(204,70,68,.16);border-color:rgba(204,70,68,.5);animation:tpulse 1s ease-in-out infinite}
  @keyframes tpulse{0%,100%{opacity:1}50%{opacity:.55}}

  /* reveal list */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px}
  .pcell{position:relative;border:1px solid var(--line);border-radius:14px;padding:18px 12px;text-align:center;
    background:rgba(20,26,58,.6);font-size:16px;font-weight:600;cursor:pointer;transition:transform .08s,border-color .15s}
  .pcell:active{transform:scale(.97)}
  .pcell .hint{display:block;font-size:11px;color:var(--gold);font-weight:600;margin-top:4px;letter-spacing:.05em}
  .pcell.done{background:rgba(127,217,154,.08);border-color:rgba(127,217,154,.3);cursor:default;color:var(--muted)}
  .pcell.done::after{content:"✓";position:absolute;top:8px;right:10px;color:#7fd99a;font-size:14px;font-weight:800}
  .pcell.done .hint{color:#7fd99a}
  .progress{text-align:center;color:var(--muted);font-size:13px;margin:14px 0 4px}

  /* reveal card */
  .reveal{min-height:78vh;display:flex;flex-direction:column;justify-content:center;gap:18px}
  .handoff{text-align:center}
  .handoff .pass{color:var(--muted);font-size:14px}
  .handoff .who{font-size:30px;font-weight:800;margin:4px 0 2px}
  .flipcard{aspect-ratio:3/4;max-height:54vh;margin:0 auto;width:min(78%,300px);perspective:1200px;cursor:pointer}
  .flipinner{position:relative;width:100%;height:100%;transition:transform .6s cubic-bezier(.4,.2,.2,1);transform-style:preserve-3d}
  .flipcard.flipped .flipinner{transform:rotateY(180deg)}
  .face{position:absolute;inset:0;backface-visibility:hidden;border-radius:20px;display:flex;flex-direction:column;
    align-items:center;justify-content:center;padding:20px;text-align:center;border:1px solid var(--line)}
  .face.back{background:
      radial-gradient(circle at 50% 38%, rgba(243,233,198,.16), transparent 60%),
      linear-gradient(160deg,#1a2150,#10152f);}
  .face.back .seal{width:84px;height:84px;border-radius:50%;border:2px solid var(--gold);display:grid;place-items:center;font-size:38px;
    box-shadow:0 0 24px rgba(224,184,74,.3);margin-bottom:14px}
  .face.back .tap{color:var(--gold);letter-spacing:.18em;text-transform:uppercase;font-size:12px}
  .face.back .nm{color:var(--muted);font-size:13px;margin-top:6px}
  .face.front{transform:rotateY(180deg);background:linear-gradient(160deg,#1c2456,#0f1430)}
  .face.front .remj{font-size:62px;line-height:1;margin-bottom:10px;display:flex;justify-content:center;align-items:center}
  .face.front .rth{font-size:26px;font-weight:800}
  .face.front .ren{font-size:12px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;margin-top:2px}
  .face.front .rdesc{font-size:13px;color:#cdd2f0;margin-top:12px;line-height:1.55}
  .teamtag{display:inline-block;margin-top:12px;font-size:11px;font-weight:700;padding:4px 12px;border-radius:999px;letter-spacing:.08em}
  .t-wolf{background:rgba(204,70,68,.18);color:#f0908e;border:1px solid rgba(204,70,68,.4)}
  .t-village{background:rgba(91,155,213,.16);color:#9fc6ee;border:1px solid rgba(91,155,213,.4)}
  .t-neutral{background:rgba(185,133,224,.16);color:#d3aef0;border:1px solid rgba(185,133,224,.4)}
  .t-special{background:rgba(224,184,74,.16);color:#f0d486;border:1px solid rgba(224,184,74,.4)}

  /* summary */
  .modwarn{text-align:center;padding:40px 16px}
  .modwarn .ico{font-size:46px}
  .sumrow{display:flex;align-items:center;gap:12px;padding:12px 4px;border-bottom:1px solid var(--line)}
  .sumrow:last-child{border-bottom:none}
  .sumrow .emj{font-size:24px;width:32px;text-align:center}
  .sumrow .nm{flex:1;font-weight:600;font-size:16px}
  .sumrow .rl{font-size:13px;text-align:right}
  .countbar{display:flex;flex-wrap:wrap;gap:8px;margin:4px 0 16px}
  .countbar .pill{background:rgba(10,14,38,.5);border:1px solid var(--line);border-radius:999px;padding:6px 12px;font-size:13px}

  .back-link{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:14px;background:none;border:none;cursor:pointer;padding:6px 0;margin-bottom:6px}
  .spacer{height:10px}
  .footnote{color:var(--muted);font-size:11px;text-align:center;margin-top:18px;line-height:1.6}

  /* game runner */
  .gtopbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .phasechip{font-weight:800;font-size:20px}
  .alivecount{font-size:12px;color:var(--muted);margin-top:2px}
  .exitbtn{background:none;border:1px solid var(--line);color:var(--muted);border-radius:10px;padding:7px 11px;font-size:13px;cursor:pointer}
  .gins{font-size:13px;color:var(--muted);text-align:center;margin:8px 0}
  .step-block{margin:6px 0;padding:8px 12px;background:rgba(224,184,74,.10);border:1px solid rgba(224,184,74,.35);border-radius:10px}
  .step-label{font-size:.8rem;color:#f0d486;font-weight:600;margin-bottom:2px}
  .step-script{font-size:.88rem;color:#e8d8ff;font-style:italic;line-height:1.5;margin-top:4px;padding-top:4px;border-top:1px solid rgba(255,255,255,.08)}
  .script-morning{margin:6px 0 10px;padding:8px 12px;background:rgba(100,60,200,.12);border:1px solid rgba(180,140,255,.25);border-radius:10px}
  .tools{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:10px 0 4px}
  .tool{border:1px solid var(--line);background:rgba(10,14,38,.5);color:var(--ink);border-radius:999px;padding:8px 13px;font-size:13px;cursor:pointer}
  .tool.on{background:linear-gradient(180deg,#f4e6b0,#e0b84a);color:#0b1026;font-weight:700;border-color:transparent}
  .tool.tdone:not(.on){border-color:rgba(127,217,154,.5);color:#9be3b1}
  .tool.tskip:not(.on){border-color:rgba(150,160,190,.45);color:#9aa6c4;opacity:.65}
  .tool.tlock:not(.on){border-color:var(--line);color:#5f6790;opacity:.55}
  .checkbar{text-align:center;border-radius:12px;padding:11px;margin:8px 0;font-weight:700;font-size:14px}
  .checkbar.g{background:rgba(127,217,154,.16);color:#9be3b1;border:1px solid rgba(127,217,154,.4)}
  .checkbar.r{background:rgba(204,70,68,.16);color:#f0908e;border:1px solid rgba(204,70,68,.4)}
  .checkbar.i{background:rgba(224,184,74,.14);color:#f0d486;border:1px solid rgba(224,184,74,.4)}
  .banner{border-radius:14px;padding:12px 14px;margin:6px 0 12px;font-size:14px;border:1px solid var(--line);background:rgba(20,26,58,.6)}
  .banner.win{background:linear-gradient(180deg,rgba(224,184,74,.22),rgba(224,184,74,.05));border-color:rgba(224,184,74,.5);text-align:center;font-size:20px;font-weight:800}
  .ggrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px;padding-bottom:96px}

const DIFF={werewolf:1,villager:1,deceased:1,toughguy:1,prince:1,mason:1,
  moderator:2,sorcerer:2,wolfcub:2,minion:2,seer:2,bodyguard:2,hunter:2,spellcaster:2,cupid:2,lycan:2,idiot:2,cursed:2,pacifist:2,mayor:2,beggar:2,
  alphawolf:3,lonewolf:3,apprentice:3,

  doppelganger:5,serialkiller:5,cultleader:5,vampire:5};

const DIFF_LABEL={1:'⭐ Beginner',2:'⭐⭐ Intermediate',3:'⭐⭐⭐ Advanced',4:'⭐⭐⭐⭐ Expert',5:'⭐⭐⭐⭐⭐ Master'};
const diffStars=n=>'⭐'.repeat(n);
// ===== ความซับซ้อนของการคุมเกม (ใช้ทั้ง Moderator dynamic difficulty + Team Complexity) =====
// tier: 1=Beginner/Easy, 3=Intermediate/Medium, 4=Advanced/High, 5=Master/Extreme
const MOD_TIER={villager:1,werewolf:1,seer:1,bodyguard:1,hunter:1,
  sorcerer:3,cupid:3,spellcaster:3,mayor:3,pacifist:3,beggar:3,
  alphawolf:4,wolfcub:4,shapeshifter:4,lonewolf:4,ghost:4,drunk:4,
  cultleader:5,vampire:5,serialkiller:5,doppelganger:5};
function roleTier(id){
  if(id in MOD_TIER) return MOD_TIER[id];
  const d=DIFF[id]||1;            // fallback: map player-difficulty → running-tier
  return d>=5?5:d>=3?4:d===2?3:1;
}
const MOD_DIFF_LABEL={1:'⭐ Beginner',3:'⭐⭐⭐ Intermediate',4:'⭐⭐⭐⭐ Advanced',5:'⭐⭐⭐⭐⭐ Master'};
const COMPLEXITY_LABEL={1:'Easy',3:'Medium',4:'High',5:'Extreme'};
function tierOfCounts(counts){
  let t=1;
  for(const id in counts){ if(!counts[id]||id==='moderator') continue; t=Math.max(t,roleTier(id)); }
  return t;
}
// ความยากของผู้ดำเนินรายการ — ฐาน Intermediate(2) แล้วยกระดับตามบทบาทที่ยากที่สุดที่เลือก
function modDifficulty(){
  let m=2;
  for(const id in S.counts){ if(!S.counts[id]||id==='moderator') continue; m=Math.max(m, DIFF[id]||1); }
  return m;
}
// ===== Synergy bonus — ปรับสมดุลจากการเข้าคู่ของบทบาท =====
function synergyScore(c){
  const has=(id,k=1)=>(c[id]||0)>=k; let s=0;
  // หมู่บ้าน
  if(has('seer')&&has('bodyguard')) s+=2;
  if(has('seer')&&has('apprentice')) s+=2;
  if(has('mayor')&&has('prince')) s+=1;
  if(has('mason',2)) s+=2;
  if(has('hunter')&&has('toughguy')) s+=1;
  if(has('bodyguard')&&has('toughguy')) s+=1;
  // หมาป่า
  if(has('werewolf')&&has('sorcerer')) s-=1;
  if(has('alphawolf')&&has('wolfcub')) s-=2;
  if(has('werewolf')&&has('shapeshifter')) s-=2;
  if(has('lonewolf')&&has('sorcerer')) s-=1;
  return s;
}
function finalBalance(c){ return ROLES.reduce((s,r)=>s+((c[r.id]||0)*r.bal),0) + synergyScore(c); }
// ===== ตัวอธิบายสมดุล: 0 สมดุล · ±1-2 เล็กน้อย · ±3-5 มาก · ±6+ ขั้นสุด =====
function balanceInfo(sc){
  if(sc===0) return {txt:'⚖️ สมดุล',en:'Balanced',cls:'b-neutral'};
  const vil=sc>0, a=Math.abs(sc);
  if(a>=6) return vil?{txt:'🏠 หมู่บ้านได้เปรียบขั้นสุด',en:'Villagers Extreme Advantage',cls:'b-navy'}
                     :{txt:'🐺 หมาป่าได้เปรียบขั้นสุด',en:'Werewolf Extreme Advantage',cls:'b-red'};
  if(a>=3) return vil?{txt:'🏠 หมู่บ้านได้เปรียบมาก',en:'Villagers Strong Advantage',cls:'b-blue'}
                     :{txt:'🐺 หมาป่าได้เปรียบมาก',en:'Werewolf Strong Advantage',cls:'b-orange'};
  return vil?{txt:'🏠 หมู่บ้านได้เปรียบเล็กน้อย',en:'Slight Villager Advantage',cls:'b-ltblue'}
            :{txt:'🐺 หมาป่าได้เปรียบเล็กน้อย',en:'Slight Werewolf Advantage',cls:'b-amber'};
}
// ===== อัตราชนะ จากคะแนนสมดุลสุดท้าย =====
function winRate(sc){
  const map={0:50,1:52,2:54,3:57,4:60,5:63,6:66};
  const a=Math.min(7,Math.abs(sc));
  const hi = a>=7?70:map[a];
  return sc<0 ? {village:100-hi, wolf:hi} : {village:hi, wolf:100-hi};
}
// ===== Social Complexity: Easy / Medium / Hard / Insane =====
const SOC_INSANE=['cultleader','vampire','serialkiller','doppelganger'];
const SOC_HARD=['cupid','ghost','drunk','alphawolf','apprentice','lonewolf','shapeshifter'];
const SOC_MED=['seer','bodyguard','hunter','mayor','spellcaster','sorcerer','minion','wolfcub','lycan','idiot','cursed','pacifist','beggar'];
function thirdPartyFactions(c){
  return ['serialkiller','cultleader','vampire','beggar'].filter(id=>(c[id]||0)>0).length;
}
function socialComplexity(c){
  if(SOC_INSANE.some(id=>(c[id]||0)>0) || thirdPartyFactions(c)>=2) return 'Insane';
  if(SOC_HARD.some(id=>(c[id]||0)>0)) return 'Hard';
  const medCount=SOC_MED.filter(id=>(c[id]||0)>0).length;
  return medCount>=2 ? 'Medium' : 'Easy';
}
function factionLabel(r){
  if(r.team==='mod') return T('facMod');
  if(r.team==='wolf') return T('facWolf');
  if(r.team==='village') return T('facVillage');
  if(r.id==='serialkiller') return T('facSolo');
  if(r.id==='cultleader') return T('facCult');
  if(r.id==='vampire') return T('facVampire');
  return T('facNeutral');
}
function winCond(r){
  const m={moderator:'winMod',
    serialkiller:'winSk',
    cultleader:'winCult',
    vampire:'winVampire',
    beggar:'winBeggar',
    drunk:'winDrunk',
    doppelganger:'winDoppel'};
  if(m[r.id]) return T(m[r.id]);
  if(r.team==='wolf') return T('winWolfTeam');
  if(r.team==='village') return T('winVillageTeam');
  return T('winNone');
}

function T(k, vars){
  const L=translations[S.lang]||translations.th;
  let s=(k in L)?L[k]:(translations.th[k]||k);
  if(vars) for(const key in vars) s=s.split('{'+key+'}').join(vars[key]);
  return s;
}
function setLang(l){ if(l!=='th'&&l!=='en') return; S.lang=l; try{ localStorage.setItem('language',l); }catch(e){} render(); }

const app=document.getElementById('app');
const totalRoles=()=>Object.values(S.counts).reduce((a,b)=>a+b,0);

function addPlayer(raw){
  const names=(raw||'').split(/[,\n]/).map(s=>s.trim()).filter(Boolean);
  if(!names.length) return;
  names.forEach(n=>S.players.push({name:n, role:null, revealed:false}));
  S._focusName=true;
  render();
}
function removePlayer(i){ S.players.splice(i,1); render(); }
function canInc(id){
  const KILLERS=['werewolf','wolfcub','lonewolf','shapeshifter'];
  const killCount=KILLERS.reduce((s,k)=>s+(S.counts[k]||0),0);
  if(id==='alphawolf' && killCount>0) return false;
  if(KILLERS.includes(id) && (S.counts.alphawolf||0)>0) return false;
  return true;
}
function setCount(id,d){
  if(d>0 && !canInc(id)) return;
  const mx=(roleById(id)||{}).max||99;
  S.counts[id]=Math.max(0,Math.min(mx,S.counts[id]+d));
  render();
}
function autoFillVillagers(){
  const diff=S.players.length-totalRoles();
  if(diff>0) S.counts.villager+=diff;
  render();
}
// ===== Team Recommendation Engine =====
const REC_MODES=[['beginner','😊 มือใหม่'],['casual','🎲 คลาสสิก'],['advanced','🔥 ขั้นสูง'],['mystic','🔮 ผู้วิเศษ']];
const MODE_DESC={
  beginner:{th:'บทบาทพื้นฐาน เข้าใจง่าย เหมาะมือใหม่', en:'Simple core roles for first-timers.'},

function recBalance(counts){ return ROLES.reduce((s,r)=>s+((counts[r.id]||0)*r.bal),0); }
// ดันสมดุลให้เข้าโซน [-2,+2] (อิงคะแนนสุดท้ายรวม synergy)
function balanceTune(counts){
  const cnt=id=>counts[id]||0;
  let guard=0;
  while(guard++<150){
    const sc=finalBalance(counts);
    if(sc>=-2 && sc<=2) break;
    if(sc<-2){ // ฝั่งหมาป่าแรงไป → เพิ่มค่า
      if(sc<=-5 && cnt('werewolf')>1){ counts.werewolf--; counts.villager=cnt('villager')+1; }      // หยาบ +7
      else if(cnt('villager')>0 && cnt('toughguy')<1){ counts.villager--; counts.toughguy=cnt('toughguy')+1; }  // ละเอียด +1 (max 1)
      else if(cnt('werewolf')>1){ counts.werewolf--; counts.villager=cnt('villager')+1; }
      else break;
    } else { // ฝั่งหมู่บ้านแรงไป → ลดค่า
      if(sc>=5 && cnt('villager')>0 && cnt('werewolf')<2){ counts.villager--; counts.werewolf=cnt('werewolf')+1; }  // หยาบ -7 (จำกัดหมาป่าไม่เกิน 2)
      else if(cnt('villager')>0 && cnt('cursed')<1){ counts.villager--; counts.cursed=cnt('cursed')+1; }            // ละเอียด -3 (max 1)
      else if(cnt('toughguy')>0){ counts.toughguy--; counts.villager=cnt('villager')+1; }
      else break;
    }
  }
  for(const k in counts){ if(!counts[k]) delete counts[k]; }
  return counts;
}
function mysticBalanceTune(counts){
  // ดันสมดุลเข้า [-3,+3] โดย "ไม่แตะ villager เด็ดขาด" — สลับหมาป่า/บทบาทพลังกันเอง (remove 1 ↔ add 1, จำนวนคนคงเดิม)
  const cnt=id=>counts[id]||0;
  // บทบาทพลังที่ยอมให้เพิ่ม/ลดได้ ครอบหลายระดับสมดุลเพื่อปรับละเอียด (กันบทบาทบังคับ seer/bodyguard/mayor/prince ไว้)
  const REMOVE=['toughguy','hunter','spellcaster','idiot','lycan','cursed','minion','sorcerer','werewolf'];
  const ADD=['toughguy','hunter','spellcaster','idiot','lycan','cursed','minion','sorcerer','werewolf'];
  let guard=0;
  while(guard++<400){
    const sc=finalBalance(counts);
    if(sc>=-3 && sc<=3) break;
    let best=null, bestAbs=Math.abs(sc);
    for(const rem of REMOVE){
      if(cnt(rem)<1) continue;
      if(rem==='werewolf' && cnt('werewolf')<=1) continue;   // เหลือหมาป่าอย่างน้อย 1
      for(const ad of ADD){
        if(ad===rem) continue;
        if(UNIQUE.has(ad) && cnt(ad)>=1) continue;             // ห้ามเพิ่ม UNIQUE role เกิน 1
        counts[rem]--; counts[ad]=cnt(ad)+1;                  // ลองสลับ
        const a=Math.abs(finalBalance(counts));
        counts[ad]--; if(!counts[ad]) delete counts[ad]; counts[rem]=cnt(rem)+1;  // คืนค่า
        if(a<bestAbs){ bestAbs=a; best=[rem,ad]; }
      }
    }
    if(!best) break;                                          // ไม่มีสลับใดดีขึ้น → หยุด
    counts[best[0]]--; if(!counts[best[0]]) delete counts[best[0]];
    counts[best[1]]=cnt(best[1])+1;
  }
  delete counts.villager;                                     // กันชาวบ้านหลุดเข้ามา
  for(const k in counts){ if(!counts[k]) delete counts[k]; }
  return counts;
}
function mysticSetup(n){
  // โหมดผู้วิเศษ: ทุกคนมีพลัง ไม่มีชาวบ้าน — สเกลตาม threshold ไม่ใช่ template ตายตัว
  const counts={}; const add=(id,k=1)=>{counts[id]=(counts[id]||0)+k;};
  const cnt=id=>counts[id]||0;
  const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
  let used=0; const left=()=>n-used;
  // หมาป่า ~27% ของผู้เล่น — ถ้า budget≥3 ใช้หมาป่า 2 + หมาป่าเดียวดาย 1 แทนหมาป่า 3+
  const wolfBudget=clamp(Math.round(n*0.27),1,Math.floor((n-1)/2));
  if(wolfBudget>=3){ add('werewolf',2); add('lonewolf',1); used+=3; }
  else { add('werewolf',wolfBudget); used+=wolfBudget; }
  // Neutral killer เพิ่มทีละตัวตาม threshold เดิม (7/9/10) แต่สูงสุด ~1 ตัวต่อ 8 คน
  const neutralPool=[['serialkiller',7],['vampire',9],['cultleader',10]];
  const maxNeutral=Math.max(1,Math.floor(n/8));
  let neutrals=0;
  for(const [id,thr] of neutralPool){ if(n>=thr && neutrals<maxNeutral && left()>1){ add(id); used++; neutrals++; } }
  // บทบาทบังคับ: ข้อมูล / ป้องกัน / ผู้นำ / จอมเวท
  if(n>=5 && left()>0){ add('seer'); used++; }        // info
  if(n>=6 && left()>0){ add('bodyguard'); used++; }   // protection
  if(n>=7 && left()>0){ add('mayor'); used++; }       // leadership
  if(n>=10 && left()>0){ add('spellcaster'); used++; } // silence mechanic เพิ่มความสนุก
  // ที่นั่งที่เหลือ: เติมด้วย village special (ห้าม villager) ลำดับตาม priority
  const dupPool=['hunter','spellcaster','lycan','toughguy','idiot','bodyguard'];
  let di=0, guard=0;
  while(left()>0 && guard++<300){
    if(left()>=2 && cnt('mason')===0 && n>=8){ add('mason',2); used+=2; continue; }   // คู่ Mason
    add(dupPool[di%dupPool.length]); used++; di++;
  }
  delete counts.villager;                              // ไม่มีชาวบ้านเด็ดขาด
  return mysticBalanceTune(counts);
}
function recommendSetup(n, mode){
  mode=mode||'beginner';
  if(mode==='mystic') return mysticSetup(n);
  const counts={}; const add=(id,k=1)=>{counts[id]=(counts[id]||0)+k;};
  const wolfBudget=Math.max(1, Math.min(Math.floor((n-1)/2), Math.round(n/4)));
  let villageSpecials, wolfSpecials=[];
  if(mode==='beginner'){
    villageSpecials=[['seer',5],['bodyguard',6],['hunter',7]];
  } else if(mode==='casual'){
    villageSpecials=[['seer',5],['bodyguard',6],['hunter',7],['spellcaster',8],['cupid',10],['lycan',11],['mayor',12]];
    wolfSpecials=[['sorcerer',9],['wolfcub',13]];
  } else { // advanced — บทบาทเชิงกลยุทธ์ (Alpha/Cupid/Mayor/Prince/Mason/Apprentice) เลี่ยง Expert/Master
    villageSpecials=[['seer',5],['bodyguard',6],['hunter',7],['mayor',8],['apprentice',9],['cupid',10],['prince',11]];
    wolfSpecials=[['sorcerer',9],['shapeshifter',12],['minion',16]];
  }
  // ฝั่งหมาป่า: รวมบทบาทพิเศษ + หมาป่าธรรมดา ให้อยู่ใน "งบ" เดียว (ไม่นับซ้ำ)
  let wolfUsed=0;
  for(const [id,thr] of wolfSpecials){ if(n>=thr && wolfUsed<wolfBudget-1){ add(id); wolfUsed++; } }
  const plainWolves=Math.min(2, Math.max(1, wolfBudget-wolfUsed));
  add('werewolf',plainWolves); wolfUsed+=plainWolves;
  let used=wolfUsed;
  for(const [id,thr] of villageSpecials){ if(n>=thr && used<n-1){ add(id); used++; } }
  if(mode==='advanced' && n>=13 && used<=n-3){ add('mason',2); used+=2; }   // คู่ Mason (เปิด synergy)
  if(n-used>0) add('villager', n-used);
  balanceTune(counts);     // ดันเข้า [-2,+2]
  return counts;
}
function setupComplexity(counts){
  const tier=tierOfCounts(counts);
  let maxDiff=1;
  for(const id in counts){ if(!counts[id]) continue; const r=roleById(id); if(r&&r.diff>maxDiff) maxDiff=r.diff; }
  return {label:COMPLEXITY_LABEL[tier]||'Easy', tier, maxDiff};
}

}

function killChain(seeds){
  const q=[...seeds];
  while(q.length){
    const i=q.shift();
    if(i==null||!G.alive[i]) continue;
    G.alive[i]=false; G.deaths.push(i);
    if(roleOf(i)==='wolfcub') G.cubBonusPending=true;
    if(effRole(i)==='ghost') G.ghostVoteDay=(G.dayNo||0)+1;
    if(G.doppleTarget===i && !G.doppleAcquired){
      const dgIdx=S.players.findIndex(p=>p.role==='doppelganger');
      if(dgIdx>=0 && G.alive[dgIdx]){
        G.doppleAcquired=true; G.doppleCopiedRole=effRole(i);
        if(G.doppleCopiedRole==='cultleader' && !G.cult.includes(dgIdx)) G.cult.push(dgIdx);
        if(G.doppleCopiedRole==='vampire' && !G.vampires.includes(dgIdx)) G.vampires.push(dgIdx);
      }
    }
    if(G.lovers&&G.lovers.includes(i)){
      const p=G.lovers[0]===i?G.lovers[1]:G.lovers[0];
      if(G.alive[p]) q.push(p);
    }
    if(roleOf(i)==='hunter') G.hunterQueue.push(i);
  }
}

function checkWin(){
  const idx=S.players.map((p,i)=>i).filter(i=>G.alive[i]&&teamOf(i)!=='mod');
  const N=idx.length;
  const inVamp=i=>G.vampires&&G.vampires.includes(i);
  const inCult=i=>G.cult&&G.cult.includes(i)&&!inVamp(i);
  const vampN=idx.filter(inVamp).length;
  const cultN=idx.filter(inCult).length;
  const skN=idx.filter(i=>effRole(i)==='serialkiller'&&!inCult(i)&&!inVamp(i)).length;
  const wolfN=idx.filter(i=>teamOf(i)==='wolf'&&!inCult(i)).length;
  const killerWolves=idx.filter(i=>!inCult(i)&&!inVamp(i)&&(['werewolf','wolfcub','alphawolf','lonewolf','shapeshifter'].includes(effRole(i))||(G.wolfConverts&&G.wolfConverts.includes(i)))).length;
  if(vampN>0 && vampN===N){ G.winner='vampire'; return true; }
  if(cultN>0 && cultN > N-cultN){ G.winner='cult'; return true; }
  if(skN>0 && N===skN){ G.winner='sk'; return true; }
  if(killerWolves>0 && wolfN >= N-wolfN){ G.winner='wolf'; return true; }
  if(killerWolves===0 && skN===0 && cultN===0 && vampN===0){ G.winner='village'; return true; }
  return false;
}

function resolveNight(){          // 🌅 เช้าแล้ว
  if(pendingNightTools().length) return;   // ยังเรียกสกิลไม่ครบ ห้ามข้ามวัน
  pushUndo();
  G.deaths=[]; G.hunterQueue=[]; G.afterHunter='day'; G.justConverts=[];
  const victims=[];
  if(G.toughDieNext!=null && G.alive[G.toughDieNext]) victims.push(G.toughDieNext);
  G.toughDieNext=null;
  if(G.infectedNext){ G.infectedNext=false; }
  else if(G.alphaConvert!=null && G.alive[G.alphaConvert] && teamOf(G.alphaConvert)!=='wolf'){
    G.wolfConverts.push(G.alphaConvert); G.justConverts.push(G.alphaConvert); G.alphaUsed=true;
  }
  else{
    G.wolfTargets.forEach(t=>{
      if(t===G.protectThis) return;
      const role=roleOf(t);
      if(role==='cursed' && !G.wolfConverts.includes(t)){ G.wolfConverts.push(t); G.justConverts.push(t); return; }
      if(role==='toughguy' && !G.toughWounded.includes(t)){ G.toughWounded.push(t); G.toughDieNext=t; return; }
      victims.push(t);
      if(role==='deceased') G.infectedNext=true;
    });
  }
  G.alphaConvert=null;
  // ฆาตกรโรคจิตฆ่า (อิสระ · บอดี้การ์ดกันได้)
  if(G.skTarget!=null && G.alive[G.skTarget] && G.skTarget!==G.protectThis && !victims.includes(G.skTarget)) victims.push(G.skTarget);
  G.skTarget=null;
  // ผู้นำลัทธิชวนเข้าลัทธิ
  if(G.cultRecruit!=null && G.alive[G.cultRecruit] && !G.cult.includes(G.cultRecruit)) G.cult.push(G.cultRecruit);
  G.cultRecruit=null;
  // แวมไพร์เปลี่ยนคนเป็นพวกตัวเอง
  if(G.vampireBite!=null && G.alive[G.vampireBite] && !G.vampires.includes(G.vampireBite)){ G.vampires.push(G.vampireBite); G.justVampires=[G.vampireBite]; }
  else G.justVampires=[];
  G.vampireBite=null;
  killChain(victims);
  // Phase B2: entry 'actKilled' คืนนี้ที่ target ไม่ตายจริง (ถูก protect ไว้ได้) → เปลี่ยนเป็น actBlocked
  {
    const deadNames=G.deaths.map(idx=>S.players[idx].name);
    const convertedNames=(G.justConverts||[]).map(idx=>S.players[idx].name);
    G.history.forEach(h=>{
      if(h.night===G.nightNo && h.key==='actKilled' && !deadNames.includes(h.vars.target)){
        if(convertedNames.includes(h.vars.target)) h.key='actCursedConvert';
        else h.key='actBlocked';
      }
    });
  }
  finishResolution();
}

  G.banner={type:'exec',deaths:[...G.deaths],princeSaved:princeName,pacifistVeto:G.pacifistVeto};

function executeSilenced(){      // คนโดนใบ้เผลอพูด -> ประหารทันที โหวตต่อได้
  if(G.silenced==null||!G.alive[G.silenced]) return;

function cupidTap(i){

  else if(G.cupidPick.length<2) G.cupidPick.push(i);

function confirmCupid(){ if(G.cupidPick.length===2){G.lovers=[...G.cupidPick]; logEvent('actPaired',{a:S.players[G.lovers[0]].name,b:S.players[G.lovers[1]].name}); enterNight();} }
function skipCupid(){ G.lovers=null; enterNight(); }
function logEvent(key, vars){

function nightTap(i){
  if(!G.alive[i]) return;
  const act=activeNightTool();
  if(act===null) return;              // ทำครบทุกสกิลแล้ว
  if(G.tool!==act) G.tool=act;        // บังคับให้ทำตามลำดับเท่านั้น
  const b=actBegin();
  const t=G.tool;
  if(t==='kill'){
    if(teamOf(i)==='wolf'){ G.check={info:true,label:T('chkWolfCantKillOwn')}; render(); return; }
    const k=G.wolfTargets.indexOf(i);
    if(k>=0) G.wolfTargets.splice(k,1);
    else if(G.wolfTargets.length<G.wolfKillCount) G.wolfTargets.push(i);
    else { G.wolfTargets.shift(); G.wolfTargets.push(i); }
    if(G.wolfTargets.includes(i)) logEvent('actKilled',{actor:roleLabel(roleById('werewolf')),target:S.players[i].name});
  } else if(t==='protect'){
    if(i===G.protectPrev) return;
    G.protectThis=(G.protectThis===i)?null:i;
    if(G.protectThis===i) logEvent('actProtected',{actor:roleLabel(roleById('bodyguard')),target:S.players[i].name});
  } else if(t==='silence'){
    if(i===G.silencedPrev){ G.check={info:true,label:T('chkSilenceRepeat')}; render(); return; }
    G.silenced=(G.silenced===i)?null:i;
  } else if(t==='alphaConvert'){
    if(teamOf(i)==='wolf'){ G.check={info:true,label:T('chkAlphaWolfOnly')}; render(); return; }
    G.alphaConvert=(G.alphaConvert===i)?null:i;
    if(G.alphaConvert===i) logEvent('actConverted',{actor:roleLabel(roleById('alphawolf')),target:S.players[i].name});
  } else if(t==='skKill'){
    if(effRole(i)==='serialkiller'){ G.check={info:true,label:T('chkSkSelfKill')}; render(); return; }
    G.skTarget=(G.skTarget===i)?null:i;
    if(G.skTarget===i) logEvent('actKilled',{actor:roleLabel(roleById('serialkiller')),target:S.players[i].name});
  } else if(t==='cultRecruit'){
    if(G.cult.includes(i)){ G.check={info:true,label:T('chkAlreadyInCult')}; render(); return; }
    G.cultRecruit=(G.cultRecruit===i)?null:i;
    if(G.cultRecruit===i) logEvent('actRecruited',{actor:roleLabel(roleById('cultleader')),target:S.players[i].name});
  } else if(t==='vampireBite'){
    if(G.vampires.includes(i)){ G.check={info:true,label:T('chkAlreadyVampire')}; render(); return; }
    G.vampireBite=(G.vampireBite===i)?null:i;
    if(G.vampireBite===i) logEvent('actBit',{actor:roleLabel(roleById('vampire')),target:S.players[i].name});
  } else if(t==='shapeShift'){
    if(effRole(i)==='shapeshifter'){ G.check={info:true,label:T('chkShapeshiftSelf')}; render(); return; }
    G.shapeTarget=(G.shapeTarget===i)?null:i;
    if(G.shapeTarget===i) logEvent('actShapeshifted',{actor:roleLabel(roleById('shapeshifter')),target:S.players[i].name});
  } else if(t==='dopplePick'){
    if(roleOf(i)==='doppelganger'){ G.check={info:true,label:T('chkDoppleSelf')}; render(); return; }
    G.doppleTarget=(G.doppleTarget===i)?null:i;
    if(G.doppleTarget===i) logEvent('actMarked',{actor:roleLabel(roleById('doppelganger')),target:S.players[i].name});
  } else if(t==='seerCheck'){
    if(i===actingSeerIdx()){ G.check={info:true,label:T('chkSeerSelf')}; render(); return; }
    if(G.seerUsed){ G.check={info:true,label:T('chkSeerUsedNow')}; }
    else if(G.seerChecked.includes(i) && !seerCanRepeat()){ G.check={info:true,label:T('chkSeerCheckedAlready',{name:esc(S.players[i].name)})}; }
    else{
      let ci=i;
      if(effRole(i)==='shapeshifter' && G.shapeTarget!=null) ci=G.shapeTarget;  // จำแลง: เห็นเป็นคนที่เลือก
      const green=seerSeesWolf(ci);
      G.check={name:S.players[i].name,green,label:green?T('chkSeerWolf'):T('chkSeerNotWolf')};
      if(!G.seerChecked.includes(i)) G.seerChecked.push(i);
      G.seerUsed=true;
      logEvent('actChecked',{actor:roleLabel(roleById('seer')),target:S.players[i].name});
    }
  } else if(t==='sorcCheck'){
    if(teamOf(i)==='wolf'){ G.check={info:true,label:T('chkSorcWolfOnly')}; render(); return; }
    if(G.sorcUsed){ G.check={info:true,label:T('chkSorcUsedNow')}; }
    else if(G.sorcChecked.includes(i) && !sorcCanRepeat()){ G.check={info:true,label:T('chkSorcCheckedAlready',{name:esc(S.players[i].name)})}; }
    else{
      const green=effRole(i)==='seer';
      G.check={name:S.players[i].name,green,label:green?T('chkSorcIsSeer'):T('chkSorcNotSeer')};
      if(!G.sorcChecked.includes(i)) G.sorcChecked.push(i);
      G.sorcUsed=true;
      logEvent('actChecked',{actor:roleLabel(roleById('sorcerer')),target:S.players[i].name});
    }
  }
  actCommit(b);
  render();
}
function dayTap(i){ if(!G.alive[i])return; G.dayVote=(G.dayVote===i)?null:i; render(); }
function hunterPick(i){
  if(!G.alive[i]) return;

function hunterSkip(){

function gameTap(i){
  if(teamOf(i)==='mod') return;
  if(G.phase==='cupid') cupidTap(i);
  else if(G.phase==='night') nightTap(i);
  else if(G.phase==='day') dayTap(i);

function nightTools(){
  const t=[];
  const KILL_IDS=['werewolf','wolfcub','alphawolf','lonewolf','shapeshifter'];
  const killerAlive=S.players.some((p,i)=>G.alive[i]&&(KILL_IDS.includes(p.role)||G.wolfConverts.includes(i)||KILL_IDS.some(id=>isAwakenedAs(i,id))));
  const alphaFirstNight=aliveHas('alphawolf')&&!G.alphaUsed&&G.nightNo===1;
  // ลำดับ: ลัทธิ → แวมไพร์ → จำแลง → นางปีศาจ → หมาป่า(รวมเดียวดาย) → ฆาตกร → เทพพยากรณ์ → บอดี้การ์ด → จอมเวท
  if(roleActiveAlive('cultleader')) t.push(['cultRecruit',T('toolCultLeader')]);
  if(roleActiveAlive('vampire')) t.push(['vampireBite',T('toolVampire')]);
  if(roleActiveAlive('shapeshifter')) t.push(['shapeShift',T('toolShapeshifter')]);
  if(roleActiveAlive('sorcerer')) t.push(['sorcCheck',T('toolSorcerer')]);
  if(alphaFirstNight) t.push(['alphaConvert',T('toolAlphaWolf')]);   // คืนแรก: แปลงร่างเท่านั้น
  else if(killerAlive) t.push(['kill',T('toolWerewolf')]);
  if(roleActiveAlive('serialkiller')) t.push(['skKill',T('toolSerialKiller')]);
  if(roleActiveAlive('seer')||(aliveHas('apprentice')&&seerDied())) t.push(['seerCheck',T('toolSeer')]);
  if(roleActiveAlive('bodyguard')) t.push(['protect',T('toolBodyguard')]);
  if(roleActiveAlive('spellcaster')) t.push(['silence',T('toolSpellcaster')]);
  if(G.nightNo===1 && aliveHas('doppelganger') && !G.doppleAcquired) t.push(['dopplePick',T('toolDoppelganger')]);
  return t;
}
function activeNightTool(){
  for(const [k] of nightTools()){ if(!toolDone(k) && !(G.skipped&&G.skipped.includes(k))) return k; }
  return null;
}
function toolDone(key){
  switch(key){
    case 'kill': return G.wolfTargets.length>=G.wolfKillCount;
    case 'alphaConvert': return G.alphaConvert!=null;
    case 'sorcCheck': return G.sorcUsed;
    case 'seerCheck': return G.seerUsed;
    case 'protect': return G.protectThis!=null;
    case 'silence': return G.silenced!=null;
    case 'skKill': return G.skTarget!=null;
    case 'cultRecruit': return G.cultRecruit!=null;
    case 'vampireBite': return G.vampireBite!=null;
    case 'shapeShift': return G.shapeTarget!=null;
    case 'dopplePick': return G.doppleTarget!=null || G.doppleAcquired;
    default: return true;
  }
}
function pendingNightTools(){
  return nightTools().map(t=>t[0]).filter(k=>!toolDone(k) && !(G.skipped&&G.skipped.includes(k)));
}
function phaseTitle(){
  if(G.phase==='cupid') return T('phaseCupid');
  if(G.phase==='night') return T('phaseNight',{n:G.nightNo});
  if(G.phase==='day') return T('phaseDay',{n:G.dayNo});
  if(G.phase==='hunter') return T('phaseHunter');
  return T('phaseOver');
}

function gcell(i){

  if(G.cult&&G.cult.includes(i)) b+='🟣';
  if(G.phase==='night'&&G.cultRecruit===i) b+='✨';
  if(G.vampires&&G.vampires.includes(i)) b+='🧛';

  if(G.phase==='night'&&G.shapeTarget===i) b+='🎭';
  if(!G.doppleAcquired&&G.doppleTarget===i) b+='🔖';
  if(teamOf(i)==='mod') b+='🎙️';
  if(G.phase==='night'&&G.seerChecked&&G.seerChecked.includes(i)) b+='🔍';

  if(G.protectThis===i) b+='🛡️';
  if(G.silenced===i) b+='🔇';
  if(G.lovers&&G.lovers.includes(i)) b+='💘';
  if(G.phase==='cupid'&&G.cupidPick.includes(i)) b+='💘';
  if(G.phase==='day'&&G.dayVote===i) b+='🗳️';
  let cls='gcell';

    if(aliveHas('pacifist')) acts.push(`<button class="mini-btn ${G.pacifistVeto?'on-pac':'pac'}" id="gPacifist">${T('pacifistBtn')}${G.pacifistVeto?' ✓':''}</button>`);
    const actRow=acts.length?`<div class="day-actions">${acts.join('')}</div>`:'';
    const dayBtnLabel=G.pacifistVeto?T('nightBtnPacifist'):(G.dayVote!=null?T('nightBtnExecute',{name:esc(S.players[G.dayVote].name)}):T('nightBtnNoVote'));
    body=`${bannerHTML(G.banner, noteExtra)}${morningScript}${tm}${actRow}<p class="gins">${T('dayInstruction')}</p>${ggrid()}
      <div class="bottombar"><button class="btn block" id="gDay">${dayBtnLabel}</button></div>`;
  } else if(G.phase==='hunter'){
    const h=G.hunterQueue[0];
    if(h==null){ G.phase=G.afterHunter==='night'?'night':'day'; return viewGame(); }
    body=`<div class="banner">${T('hunterDied',{name:'<b>'+esc(S.players[h].name)+'</b>'})}</div>${ggrid()}
      <div class="bottombar"><button class="btn ghost block" id="gHunterSkip">${T('hunterSkipBtn')}</button></div>`;
  } else if(G.phase==='over'){
    if(G.showHistory){
      body=viewHistory();
    } else {
      const txt=G.winner==='wolf'?T('winnerWolf'):G.winner==='cult'?T('winnerCult'):G.winner==='sk'?T('winnerSk'):G.winner==='vampire'?T('winnerVampire'):T('winnerVillage');
      body=`<div class="banner win">${txt}</div>
        <div class="card">${S.players.map((p,i)=>{const r=(G.wolfConverts&&G.wolfConverts.includes(i))?roleById('werewolf'):roleById(p.role);return `<div class="sumrow"><div class="emj">${iconHTML(r,30)}</div><div class="nm">${esc(p.name)} ${G.alive[i]?'':'💀'}</div><div class="rl"><span class="teamtag t-${r.team}" style="margin:0">${roleLabel(r)}</span></div></div>`}).join('')}</div>
        <button class="btn block ghost" id="gHistoryBtn">${T('historyTitle')}</button>
        <button class="btn block" id="gExit2">${T('backToSummaryBtn')}</button>`;
    }
  }
  return top+body;
}

function revealPackInfo(selfIdx){
  const PACK=['werewolf','wolfcub','alphawolf','shapeshifter','sorcerer'];
  const self=S.players[selfIdx].role;
  if(self==='lonewolf') return `<div class="packbox">${T('loneWolfReveal')}</div>`;
  if(self==='mason'){
    const others=S.players.filter((q,j)=>j!==selfIdx&&q.role==='mason').map(q=>q.name);
    const list=others.length?others.map(esc).join(', '):T('noOtherMasons');
    return `<div class="packbox" style="background:rgba(91,155,213,.14);border-color:rgba(91,155,213,.4);color:#cfe3f5">${T('otherMasons')}: <b>${list}</b></div>`;
  }
  let names=[];
  if(PACK.includes(self)) names=S.players.filter((q,j)=>j!==selfIdx&&PACK.includes(q.role)).map(q=>q.name);
  else if(self==='minion') names=S.players.filter(q=>PACK.includes(q.role)).map(q=>q.name);
  else return '';
  const list=names.length?names.map(esc).join(', '):T('noOtherWolves');
  const head=self==='minion'?T('wolvesYouKnow'):T('yourWolfTeam');
  return `<div class="packbox">${head}: <b>${list}</b></div>`;
}

  let ph='';
  if(S.screen==='mod'&&G){
    if(G.phase==='day') ph='phase-day';
    else if(G.phase==='night'||G.phase==='cupid'||G.phase==='hunter') ph='phase-night';
  }
  const fade = (_prevScreen!==S.screen) && ['menu','setup','settings','rules','script'].includes(S.screen);
  app.className='wrap'+(ph?' '+ph:'')+(fade?' fade-in':'');
  if(fade){ app.style.animation='none'; void app.offsetWidth; app.style.animation=''; }
  _prevScreen=S.screen;
  hideLoader();
  bind();
  if(sameView) window.scrollTo(0,sy); else window.scrollTo(0,0);
  _lastKey=viewKey();
}

function bind(){
  const $=id=>document.getElementById(id);
  if(S.screen==='menu'){
    const st=$('menuStart'); if(st) st.onclick=()=>{S.screen='setup';showLoader();requestAnimationFrame(()=>requestAnimationFrame(()=>render()));};
    const se=$('menuSettings'); if(se) se.onclick=()=>{S.screen='settings';requestAnimationFrame(()=>requestAnimationFrame(()=>render()));};
    const mr=$('menuRules'); if(mr) mr.onclick=()=>{S.screen='rules';requestAnimationFrame(()=>requestAnimationFrame(()=>render()));};
    return;
  }
  if(S.screen==='rules'){
    const rb=$('rulesBack'); if(rb) rb.onclick=()=>{S.screen='menu';render();};
    return;
  }
  if(S.screen==='settings'){
    const b=$('setBack'); if(b) b.onclick=()=>{S.screen='menu';render();};
    document.querySelectorAll('[data-lang]').forEach(el=>el.onclick=()=>setLang(el.dataset.lang));
    return;
  }
  if(S.screen==='setup'){
    const bm=$('backMenu'); if(bm) bm.onclick=()=>{S.screen='menu';render();};
    const inp=$('pname');
    $('addBtn').onclick=()=>{addPlayer(inp.value); };
    inp.onkeydown=e=>{if(e.key==='Enter'){addPlayer(inp.value);}};
    document.querySelectorAll('[data-rm]').forEach(el=>el.onclick=()=>removePlayer(+el.dataset.rm));
    document.querySelectorAll('[data-inc]').forEach(el=>el.onclick=()=>setCount(el.dataset.inc,1));
    document.querySelectorAll('[data-dec]').forEach(el=>el.onclick=()=>setCount(el.dataset.dec,-1));
    document.querySelectorAll('[data-info]').forEach(el=>el.onclick=()=>{S.expandedRole=(S.expandedRole===el.dataset.info)?null:el.dataset.info;render();});
    document.querySelectorAll('[data-timer]').forEach(el=>el.onclick=()=>{S.timerMin=+el.dataset.timer;render();});
    document.querySelectorAll('[data-toggle]').forEach(el=>el.onclick=()=>{const k=el.dataset.toggle;S[k]=!S[k];render();});
    document.querySelectorAll('[data-toggle3]').forEach(el=>el.onclick=()=>{const k=el.dataset.toggle3;S[k]=((S[k]||0)+1)%3;render();});
    $('autofill').onclick=autoFillVillagers;
    const ar=$('applyRec'); if(ar) ar.onclick=applyRecommendation;
    document.querySelectorAll('[data-recmode]').forEach(el=>el.onclick=()=>{S.recMode=el.dataset.recmode;render();});
    $('startBtn').onclick=startGame;
    if(S._focusName){ setTimeout(()=>inp&&inp.focus(),30); S._focusName=false; }
  }
  else if(S.screen==='list'){
    document.querySelectorAll('[data-open]').forEach(el=>el.onclick=()=>openReveal(+el.dataset.open));
    const tm=$('toMod'); if(tm) tm.onclick=()=>{S.screen='mod';render();};
    $('backSetup').onclick=()=>{S.screen='setup';render();};
  }
  else if(S.screen==='reveal'){
    $('flip').onclick=()=>{ if(!S.flipped){S.flipped=true;render();} };
    const c=$('confirm'); if(c) c.onclick=confirmReveal;
  }
  else if(S.screen==='mod'){
    if(G&&G.running){ bindGame(); return; }
    const u=$('unlock'); if(u) u.onclick=()=>{S.modUnlocked=true;render();};
    const bl=$('backList2'); if(bl) bl.onclick=()=>{S.screen='list';render();};
    const sr=$('startRun'); if(sr) sr.onclick=startRun;
    const rs=$('reshuffle'); if(rs) rs.onclick=reshuffle;
    const ra=$('resetAll2'); if(ra) ra.onclick=resetAll;
    const mb=$('modBeginner'); if(mb) mb.onclick=()=>{S.modLevel='beginner';render();};
    const mn=$('modNormal'); if(mn) mn.onclick=()=>{S.modLevel='normal';render();};
    const sb=$('scriptBtn'); if(sb) sb.onclick=()=>{S.scriptFrom='mod';S.screen='script';render();};
  }
  else if(S.screen==='script'){
    const bb=$('scriptBack'); if(bb) bb.onclick=()=>{S.screen=S.scriptFrom||'mod';render();};
    const bb2=$('scriptBack2'); if(bb2) bb2.onclick=()=>{S.screen=S.scriptFrom||'mod';render();};
  }
}
function bindGame(){
  const $=id=>document.getElementById(id);
  document.querySelectorAll('[data-gp]').forEach(el=>el.onclick=()=>gameTap(+el.dataset.gp));
  document.querySelectorAll('[data-tool]').forEach(el=>el.onclick=()=>{G.tool=el.dataset.tool;G.check=null;render();});
  const map={gExit:exitGame,gExit2:exitGame,gNight:resolveNight,gDay:resolveDay,
    gCupidOk:confirmCupid,gCupidSkip:skipCupid,gHunterSkip:hunterSkip,
    gUndo:doUndo,gExecSil:executeSilenced,gActUndo:doActUndo,
    gSkipTool:()=>{ const b=actBegin(); if(!G.skipped) G.skipped=[]; if(!G.skipped.includes(G.tool)) G.skipped.push(G.tool); actCommit(b); render(); },
    gPacifist:()=>{G.pacifistVeto=!G.pacifistVeto;render();},
    gHistoryBtn:()=>{G.showHistory=true;render();}, gHistoryBack:()=>{G.showHistory=false;render();}};
  Object.keys(map).forEach(id=>{const e=$(id); if(e) e.onclick=map[id];});
}

render();
</script>
</body>
</html>
